version: 1.0
runtime: python311

build:
  commands:
    pre-build:
      - pip3 install -r requirements.txt
    build:
      - echo "Installing dependencies in pre-build is required for AppRunner Python3.11"

run:
  command: python3 -m uvicorn src.main:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
